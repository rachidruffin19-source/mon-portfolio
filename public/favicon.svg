<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <!-- Fond arrondi -->
    <clipPath id="clip">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- Fond sombre -->
  <rect width="64" height="64" rx="14" fill="#0d0d18"/>

  <!-- Lettre R gauche -->
  <text
    x="6" y="46"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="38"
    fill="url(#grad)"
  >R</text>

  <!-- Lettre R droite, légèrement décalée -->
  <text
    x="31" y="46"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="38"
    fill="url(#grad)"
    opacity="0.75"
  >R</text>

  <!-- Accent décoratif — petite ligne cyan en bas -->
  <rect x="6" y="52" width="52" height="2.5" rx="1.25" fill="url(#grad)" opacity="0.6"/>
</svg>
